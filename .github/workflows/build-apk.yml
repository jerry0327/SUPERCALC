name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run calculator engine smoke test
        run: |
          mkdir -p build/smoke-test
          javac -encoding UTF-8 -d build/smoke-test app/src/main/java/com/jerry0327/supercalc/CalculatorEngine.java tools/CalculatorEngineSmokeTest.java
          java -cp build/smoke-test CalculatorEngineSmokeTest

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: supercalc-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
